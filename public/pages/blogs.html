<section class="bg-[#f7fbff] text-[#071f4d]">
  <!-- Hero -->
  <div class="relative overflow-hidden border-b border-[#e4edf8] bg-[#eef6ff]">
    <img
      src="/images/blog/futuristic_tech_showroom_with_digital_displays.avif"
      alt="GCTL LED Blogs"
      class="absolute inset-0 h-full w-full object-cover object-[70%_center]" />

    <div
      class="absolute inset-0 bg-gradient-to-r from-[#f7fbff] via-[#f7fbff]/94 to-[#f7fbff]/35"></div>

    <div class="relative mx-auto max-w-[1320px] px-4 sm:px-6 lg:px-8">
      <div class="flex min-h-[330px] items-center py-12">
        <div class="max-w-[690px]">
          <div
            class="mb-5 flex items-center gap-3 text-[13px] font-semibold text-[#617187]">
            <a href="/index.html" class="hover:text-[#0068d9]">Home</a>
            <span class="text-[#9aaabd]">›</span>
            <span class="text-[#071f4d]">Blogs</span>
          </div>

          <p
            class="mb-3 text-[12px] font-black uppercase tracking-[0.24em] text-[#0068d9]">
            Latest Insights
          </p>

          <h1
            class="max-w-[680px] text-[34px] font-black leading-[1.08] tracking-[-1.2px] text-[#071f4d] sm:text-[46px] lg:text-[52px]">
            News, Guides &amp; Insights for LED Display Solutions
          </h1>

          <p
            class="mt-5 max-w-[610px] text-[14px] font-semibold leading-7 text-[#40556d] sm:text-[15px]">
            Explore expert guides, industry trends, and practical ideas about
            LED display, digital signage, video wall, kiosk and billboard
            solutions.
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Blogs -->
  <div class="mx-auto max-w-[1320px] px-4 py-10 sm:px-6 lg:px-8 lg:py-14">
    <div
      class="mb-7 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p
          class="text-[12px] font-black uppercase tracking-[0.22em] text-[#0068d9]">
          All Blogs
        </p>

        <h2
          class="mt-3 text-[30px] font-black tracking-[-0.8px] text-[#071f4d]">
          View All Blogs
        </h2>
      </div>

      <p id="blogsCount" class="text-[13px] font-bold text-[#5a6d84]"></p>
    </div>

    <!-- Blog Categories -->
    <!-- <div
      id="blogsCategories"
      class="mb-8 flex flex-wrap gap-3"
    ></div> -->

    <!-- Blog Categories Slider -->
    <div
      class="mb-8 rounded-[14px] border border-[#dbe8f5] bg-white p-4 shadow-[0_16px_45px_rgba(7,31,77,0.06)]">
      <div class="flex items-center gap-3">
        <button
          type="button"
          id="blogsCategoryPrev"
          class="grid h-11 w-11 shrink-0 place-items-center rounded-[8px] border border-[#d7e4f2] bg-white text-[18px] font-black text-[#071f4d] transition hover:border-[#0068d9] hover:bg-[#0068d9] hover:text-white"
          aria-label="Previous categories">
          ‹
        </button>

        <div
          id="blogsCategories"
          class="flex flex-1 gap-4 overflow-x-auto scroll-smooth whitespace-nowrap pb-1 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"></div>

        <button
          type="button"
          id="blogsCategoryNext"
          class="grid h-11 w-11 shrink-0 place-items-center rounded-[8px] border border-[#d7e4f2] bg-white text-[18px] font-black text-[#071f4d] transition hover:border-[#0068d9] hover:bg-[#0068d9] hover:text-white"
          aria-label="Next categories">
          ›
        </button>
      </div>
    </div>

    <div
      id="blogsGrid"
      class="grid grid-cols-1 gap-7 md:grid-cols-2 lg:grid-cols-3"></div>
  </div>
</section>
