<section
  id="industries"
  class="relative overflow-hidden bg-[#062a55] py-9 sm:py-10 lg:py-11">
  <!-- Background -->
  <div class="pointer-events-none absolute inset-0">
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_18%_20%,rgba(0,102,255,0.35),transparent_34%),radial-gradient(circle_at_88%_35%,rgba(0,174,255,0.22),transparent_36%)]"></div>
    <div
      class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.035)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.035)_1px,transparent_1px)] bg-[size:38px_38px] opacity-25"></div>
  </div>

  <div class="relative mx-auto max-w-[1320px] px-4 sm:px-6 lg:px-8">
    <!-- Heading -->
    <div class="mb-6 flex items-end justify-between gap-4">
      <div>
        <h2
          class="text-[24px] font-semibold leading-tight tracking-[-0.02em] text-white sm:text-[28px]">
          Solutions for Every Industry
        </h2>

        <p class="mt-1 text-[13px] leading-5 text-white/70 sm:text-sm">
          Empowering businesses with innovative digital experiences.
        </p>
      </div>

      <a
        href="/industries.html"
        class="hidden items-center gap-2 text-[13px] font-medium text-white/80 transition hover:text-white sm:inline-flex">
        View All Industries
        <span>→</span>
      </a>
    </div>

    <!-- Slider -->
    <div class="relative">
      <!-- Left Button -->
      <button
        id="industriesPrevBtn"
        type="button"
        aria-label="Previous industries"
        class="absolute left-4 top-1/2 z-20 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full border border-white/70 bg-white text-[#062a55] shadow-[0_10px_30px_rgba(0,0,0,0.28)] transition hover:bg-[#0057d8] hover:text-white">
        <svg
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.4"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M15 18L9 12L15 6" />
        </svg>
      </button>
      <!-- Right Button -->
      <button
        id="industriesNextBtn"
        type="button"
        aria-label="Next industries"
        class="absolute right-4 top-1/2 z-20 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full border border-white/70 bg-white text-[#062a55] shadow-[0_10px_30px_rgba(0,0,0,0.28)] transition hover:bg-[#0057d8] hover:text-white">
        <svg
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.4"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 18L15 12L9 6" />
        </svg>
      </button>

      <div class="overflow-hidden">
        <div
          id="industriesSlider"
          class="flex gap-4 overflow-x-auto scroll-smooth pb-1 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
          <!-- Retail -->
          <a
            href="/industries/retail-supermarkets.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/modern_supermarket_interior_with_vibrant_displays.avif"
                alt="Retail and supermarkets LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Retail &amp; Supermarkets
            </h3>
          </a>

          <!-- Hospitality -->
          <a
            href="/industries/hospitality.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/luxurious_hotel_lobby_with_modern_elegance.avif"
                alt="Hospitality LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Hospitality
            </h3>
          </a>

          <!-- Transportation -->
          <a
            href="/industries/transportation.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/modern_airport_terminal_with_digital_displays.avif"
                alt="Transportation LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Transportation
            </h3>
          </a>

          <!-- Healthcare -->
          <a
            href="/industries/healthcare.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/modern_healthcare_reception_with_tech_design.avif"
                alt="Healthcare LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Healthcare
            </h3>
          </a>

          <!-- Education -->
          <a
            href="/industries/education.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/modern_classroom_with_digital_display.avif"
                alt="Education LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Education
            </h3>
          </a>

          <!-- Corporate -->
          <a
            href="/industries/corporate.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/modern_corporate_meeting_room_with_data_dashboard.avif"
                alt="Corporate LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Corporate
            </h3>
          </a>

          <!-- Entertainment -->
          <a
            href="/industries/entertainment.html"
            class="group block shrink-0 min-w-[calc((100%_-_16px)_/_2)] sm:min-w-[calc((100%_-_32px)_/_3)] lg:min-w-[calc((100%_-_64px)_/_5)]"
            data-industry-card>
            <div
              class="relative overflow-hidden rounded-[10px] border border-white/15 bg-white/10 shadow-[0_16px_38px_rgba(0,0,0,0.28)]">
              <img
                src="/images/industries/electric_energy_of_live_music.avif"
                alt="Entertainment LED display solution"
                class="h-[145px] w-full object-cover transition duration-500 group-hover:scale-110 sm:h-[160px] lg:h-[170px]" />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/35 via-transparent to-transparent"></div>
            </div>

            <h3
              class="mt-2 text-center text-[12px] font-medium leading-5 text-white/90 sm:text-[13px]">
              Entertainment
            </h3>
          </a>
        </div>
      </div>
    </div>

    <!-- Mobile link -->
    <div class="mt-6 sm:hidden">
      <a
        href="/industries.html"
        class="inline-flex items-center gap-2 text-[13px] font-medium text-white/85">
        View All Industries
        <span>→</span>
      </a>
    </div>
  </div>
</section>
