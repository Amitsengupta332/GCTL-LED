<section
  id="heroSlider"
  class="relative overflow-hidden bg-white pt-12 pb-20 lg:pt-20 lg:pb-32">
  <!-- Slide 01 Background Image -->
  <div
    class="hero-slide absolute inset-0 opacity-100 visible z-10 transition-all duration-700 ease-in-out pointer-events-none">
    <!-- Background Glow Effects -->
    <div
      class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div
      class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-96 h-96 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Right Side Background Image -->
    <div
      class="absolute inset-y-0 right-0 w-full lg:w-[52%] pointer-events-none z-0">
      <img
        src="/images/banner.png"
        alt="GCTL LED Display Banner"
        class="absolute right-0 top-1/2 -translate-y-1/2 w-[95%] sm:w-[78%] lg:w-full max-h-[620px] object-contain object-right opacity-15 lg:opacity-100" />

      <!-- Soft fade so text stays readable -->
      <div
        class="absolute inset-0 bg-gradient-to-r from-white via-white/70 to-transparent lg:from-white lg:via-white/20 lg:to-transparent"></div>
    </div>
  </div>

  <!-- Slide 02 Background Image -->
  <div
    class="hero-slide absolute inset-0 opacity-0 invisible z-0 transition-all duration-700 ease-in-out pointer-events-none">
    <!-- Background Glow Effects -->
    <div
      class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div
      class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Right Side Background Image -->
    <div
      class="absolute inset-y-0 right-0 w-full lg:w-[52%] pointer-events-none z-0">
      <img
        src="/images/banner-2.png"
        alt="Outdoor LED Advertising Display"
        class="absolute right-0 top-1/2 -translate-y-1/2 w-[95%] sm:w-[78%] lg:w-full max-h-[620px] object-contain object-right opacity-15 lg:opacity-100" />

      <!-- Soft fade so text stays readable -->
      <div
        class="absolute inset-0 bg-gradient-to-r from-white via-white/70 to-transparent lg:from-white lg:via-white/20 lg:to-transparent"></div>
    </div>
  </div>

  <!-- Slide 03 Background Image -->
  <div
    class="hero-slide absolute inset-0 opacity-0 invisible z-0 transition-all duration-700 ease-in-out pointer-events-none">
    <!-- Background Glow Effects -->
    <div
      class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div
      class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-96 h-96 bg-teal-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Right Side Background Image -->
    <div
      class="absolute inset-y-0 right-0 w-full lg:w-[52%] pointer-events-none z-0">
      <img
        src="/images/banner-3.png"
        alt="Commercial LED Video Wall Display"
        class="absolute right-0 top-1/2 -translate-y-1/2 w-[95%] sm:w-[78%] lg:w-full max-h-[620px] object-contain object-right opacity-15 lg:opacity-100" />

      <!-- Soft fade so text stays readable -->
      <div
        class="absolute inset-0 bg-gradient-to-r from-white via-white/70 to-transparent lg:from-white lg:via-white/20 lg:to-transparent"></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="relative z-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid lg:grid-cols-12 gap-12 lg:gap-8 items-center">
      <!-- Hero Left Content -->
      <div class="lg:col-span-7 space-y-6 text-center lg:text-left">
        <div
          class="inline-flex items-center space-x-2 bg-emerald-500/10 border border-emerald-500/30 rounded-full px-4 py-1.5 text-xs sm:text-sm font-semibold text-emerald-500 tracking-wide uppercase">
          <span
            class="flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
          <span>Next-Gen Advertising Technology</span>
        </div>

        <h1
          class="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tight leading-none text-slate-900">
          Premium Outdoor <br class="hidden sm:inline" />
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 via-teal-400 to-emerald-600">
            P4 LED Display Screen
          </span>
          <br />
          for Business Growth
        </h1>

        <p
          class="text-base sm:text-lg text-slate-600 max-w-2xl mx-auto lg:mx-0 font-medium">
          High Brightness • Waterproof Design • Energy Efficient • Crystal Clear
          Display • 24/7 Operation
        </p>

        <div
          class="grid grid-cols-2 sm:grid-cols-4 gap-4 pt-4 text-left max-w-xl mx-auto lg:mx-0">
          <div class="flex items-center space-x-2">
            <i class="fas fa-check-circle text-emerald-500"></i>
            <span class="text-sm font-medium text-slate-700">5500+ Nits</span>
          </div>

          <div class="flex items-center space-x-2">
            <i class="fas fa-check-circle text-emerald-500"></i>
            <span class="text-sm font-medium text-slate-700"
              >IP65 Waterproof</span
            >
          </div>

          <div class="flex items-center space-x-2">
            <i class="fas fa-check-circle text-emerald-500"></i>
            <span class="text-sm font-medium text-slate-700"
              >3840Hz Refresh</span
            >
          </div>

          <div class="flex items-center space-x-2">
            <i class="fas fa-check-circle text-emerald-500"></i>
            <span class="text-sm font-medium text-slate-700"
              >100k Hrs Life</span
            >
          </div>
        </div>

        <div
          class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4 pt-6">
          <a
            href="#contact"
            class="w-full sm:w-auto text-center bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-600 hover:to-amber-700 text-white font-bold px-8 py-4 rounded-xl shadow-lg shadow-orange-500/20 transition-all transform hover:-translate-y-0.5">
            Request Quotation
          </a>

          <a
            href="#contact"
            class="w-full sm:w-auto text-center bg-slate-800 hover:bg-slate-900 border border-slate-700 text-white font-semibold px-8 py-4 rounded-xl transition-all">
            Get Free Consultation
          </a>

          <a
            href="https://wa.me/8801847213869"
            target="_blank"
            class="w-full sm:w-auto text-center bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-4 rounded-xl flex items-center justify-center space-x-2 transition-all">
            <i class="fab fa-whatsapp text-xl"></i>
            <span>WhatsApp Now</span>
          </a>
        </div>
      </div>

      <!-- Empty right space for desktop image balance -->
      <div class="hidden lg:block lg:col-span-5"></div>
    </div>
  </div>

  <!-- Prev Button -->
  <button
    id="heroPrev"
    type="button"
    aria-label="Previous slide"
    class="absolute left-4 sm:left-6 lg:left-8 top-1/2 z-[999] flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full bg-white text-[#003b78] shadow-xl ring-1 ring-slate-200 transition hover:bg-[#0068c9] hover:text-white pointer-events-auto">
    <span class="block -mt-0.5 text-3xl font-black leading-none">‹</span>
  </button>

  <!-- Next Button -->
  <button
    id="heroNext"
    type="button"
    aria-label="Next slide"
    class="absolute right-4 sm:right-6 lg:right-8 top-1/2 z-[999] flex h-11 w-11 -translate-y-1/2 items-center justify-center rounded-full bg-white text-[#003b78] shadow-xl ring-1 ring-slate-200 transition hover:bg-[#0068c9] hover:text-white pointer-events-auto">
    <span class="block -mt-0.5 text-3xl font-black leading-none">›</span>
  </button>

  <!-- Dots -->
  <div
    id="heroDots"
    class="absolute bottom-6 left-1/2 z-[999] flex -translate-x-1/2 items-center gap-2 pointer-events-auto"></div>
</section>
