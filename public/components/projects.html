<section class="bg-[#f7fbff] py-12 text-[#0b1f33]">

              src="/images/projects/a_wide_angle_high_resolution_interior_scene_of_a.avif"

              class="h-full w-full object-cover transition duration-500 group-hover:scale-105" />
